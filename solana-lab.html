<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solana Ribbon Lab — layer dissection</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;color:#EDF2FB;font-family:"IBM Plex Mono",monospace;overflow:hidden}
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block}
  .panel{position:fixed;top:18px;left:18px;background:rgba(10,13,18,.82);border:1px solid rgba(214,226,247,.12);
    border-radius:14px;padding:18px 20px;backdrop-filter:blur(14px);max-width:330px;z-index:2}
  h1{font-family:"Space Grotesk",sans-serif;font-size:16px;margin-bottom:2px}
  .sub{font-size:10.5px;color:#8A97AD;margin-bottom:12px}
  label{display:flex;gap:9px;align-items:flex-start;font-size:11.5px;padding:7px 0;cursor:pointer;border-top:1px solid rgba(214,226,247,.07)}
  label b{color:#C9A227;font-weight:500}
  label span{color:#8A97AD;display:block;font-size:10px;margin-top:2px;line-height:1.45}
  input[type=checkbox]{accent-color:#C9A227;margin-top:2px}
  .speed{display:flex;align-items:center;gap:10px;font-size:11px;padding-top:10px;border-top:1px solid rgba(214,226,247,.07)}
  input[type=range]{flex:1;accent-color:#C9A227}
  .hint{position:fixed;bottom:14px;right:16px;font-size:10px;color:#5a6577;z-index:2}
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div class="panel">
  <h1>Solana Ribbon Lab</h1>
  <div class="sub">their hero, rebuilt layer by layer. toggle to dissect.</div>
  <label><input type="checkbox" id="L1" checked><div><b>1 · Base gradient</b><span>near-black canvas with a faint purple-green breath. Without it: void.</span></div></label>
  <label><input type="checkbox" id="L2" checked><div><b>2 · The ribbon (raymarched)</b><span>a thin glass sheet bent by two slow summed sine waves (their exact 0.05 / 0.075 time coefficients).</span></div></label>
  <label><input type="checkbox" id="L3" checked><div><b>3 · Gloss: fresnel + specular</b><span>the lavender #B69AFF rim light + one tight highlight. This is the "wet glass" feel.</span></div></label>
  <label><input type="checkbox" id="L4" checked><div><b>4 · Chromatic dispersion</b><span>red and blue bend differently at the edges: the purple-green fringe.</span></div></label>
  <label><input type="checkbox" id="L5" checked><div><b>5 · Noise fog (fbm)</b><span>drifting color clouds at speed 0.33, faintly following the mouse.</span></div></label>
  <label><input type="checkbox" id="L6" checked><div><b>6 · Film grain</b><span>per-pixel dither. Kills banding, adds "shot on camera" texture.</span></div></label>
  <div class="speed">speed <input type="range" id="speed" min="0" max="3" step="0.1" value="1"><span id="sv">1.0</span></div>
</div>
<div class="hint">30fps cap · move the mouse · this is the jutsu behind solana.com</div>

<script>
const cv = document.getElementById("gl");
const gl = cv.getContext("webgl");
const VS = `attribute vec2 p; void main(){ gl_Position = vec4(p,0.,1.); }`;
const FS = `
precision highp float;
uniform vec2 uRes; uniform float uT; uniform vec2 uMouse;
uniform float uBase,uRibbon,uGloss,uChroma,uNoise,uGrain;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
float vnoise(vec2 p){
  vec2 i=floor(p), f=fract(p); f=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x), mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x), f.y);
}
float fbm(vec2 p){ float v=0., a=.5; for(int i=0;i<4;i++){ v+=a*vnoise(p); p*=2.13; a*=.5; } return v; }

// the ribbon: a height surface bent by Solana's summed sines (t coeffs .05/.075 scaled)
float H(float x, float z, float t){
  float w1 = sin(x*1.35 + t*0.50)*0.42;
  float w2 = cos((x+0.92)*1.05 + t*0.75)*0.38;
  float w3 = sin(z*0.9  + t*0.40)*0.22;
  float fall = exp(-abs(z-1.5)*0.22);
  return (w1+w2)*0.55*fall + w3*fall - 0.55;
}
float sdf(vec3 p, float t){ return p.y - H(p.x, p.z, t); }
vec3 norm(vec3 p, float t){
  float e=.02;
  return normalize(vec3( sdf(p+vec3(e,0,0),t)-sdf(p-vec3(e,0,0),t), 2.*e, sdf(p+vec3(0,0,e),t)-sdf(p-vec3(0,0,e),t) ));
}

void main(){
  vec2 uv = (gl_FragCoord.xy - .5*uRes) / uRes.y;
  float t = uT;

  // 1 base
  vec3 col = vec3(0.0);
  if(uBase>.5){
    col = mix(vec3(.005,.004,.010), vec3(.012,.006,.028), smoothstep(-.6,.7,uv.x+uv.y*.5));
    col += vec3(.0,.02,.012) * smoothstep(.6,-.4,uv.y) * .35;
  }

  // 2 ribbon raymarch
  if(uRibbon>.5){
    vec3 ro = vec3(0., .45, -4.25);
    vec3 rd = normalize(vec3(uv*0.9, 1.6));
    float dist=0.; bool hit=false; vec3 p;
    for(int i=0;i<80;i++){
      p = ro + rd*dist;
      float d = sdf(p,t);
      if(d < .004){ hit=true; break; }
      dist += d*.55;
      if(dist>14.) break;
    }
    if(hit){
      vec3 N = norm(p,t);
      vec3 V = -rd;
      vec3 L = normalize(vec3(-1.4,1.6,-2.2) - p);
      float ndv = clamp(dot(N,V),0.,1.);
      // dark glass body, deeper blue in the troughs
      vec3 body = mix(vec3(.010,.014,.030), vec3(.020,.030,.055), clamp(N.y,0.,1.));
      vec3 c = body;
      if(uGloss>.5){
        vec3 lav = vec3(.714,.604,1.0);
        float fres = pow(1.-ndv, 6.0);
        float spec = pow(max(dot(N, normalize(L+V)),0.), 64.0);
        if(uChroma>.5){
          float fr = pow(1.-clamp(ndv+.030,0.,1.), 6.0);
          float fb = pow(1.-clamp(ndv-.045,0.,1.), 6.0);
          c += vec3(fr*.55, fres*.42, fb*.85) * .55;           // dispersed rim
          c += vec3(.35,.95,.62) * pow(1.-ndv, 11.0) * .10;    // green kiss at grazing edge
        } else {
          c += lav * fres * .48;
        }
        c += lav * spec * .9;
        c += vec3(1.,.82,.55) * pow(max(dot(N,normalize(vec3(1.8,1.2,-2.5)-p)),0.), 90.0)*.25; // warm counter-glint
      }
      float fog = exp(-dist*.16);
      col = mix(col, c, fog);
    }
  }

  // 5 noise fog
  if(uNoise>.5){
    vec2 m = (uMouse - .5) * .35;
    float n  = fbm(uv*2.1 + vec2(t*.033,0.) + m*0.07);
    float n2 = fbm(uv*3.3 - vec2(0.,t*.021));
    vec3 tint = mix(vec3(.16,.05,.30), vec3(.02,.22,.13), n2);
    col += tint * n * .16 * smoothstep(-.1,-.75,uv.y-.2);
  }

  // 6 grain
  if(uGrain>.5){
    float g = hash(gl_FragCoord.xy + fract(t)*100.);
    col += (g-.5) * (8./255.);
  }

  col = pow(col, vec3(.92));
  gl_FragColor = vec4(col,1.);
}`;

function sh(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s)); return s; }
const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog); gl.useProgram(prog);
gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog, "p");
gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const U = n => gl.getUniformLocation(prog, n);
const uRes=U("uRes"), uT=U("uT"), uMouse=U("uMouse");
const toggles = { L1:U("uBase"), L2:U("uRibbon"), L3:U("uGloss"), L4:U("uChroma"), L5:U("uNoise"), L6:U("uGrain") };

let mouse=[.5,.5];
addEventListener("mousemove", e => { mouse=[e.clientX/innerWidth, 1-e.clientY/innerHeight]; });
function resize(){ cv.width=innerWidth*devicePixelRatio; cv.height=innerHeight*devicePixelRatio; gl.viewport(0,0,cv.width,cv.height); }
addEventListener("resize", resize); resize();

const speedEl=document.getElementById("speed"), sv=document.getElementById("sv");
const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
let t=0, last=0;
function frame(now){
  requestAnimationFrame(frame);
  if(now-last < 33) return;                       // 30fps cap, like the real one
  const dt=(now-last)/1000; last=now;
  if(!reduced) t += dt*parseFloat(speedEl.value);
  sv.textContent = parseFloat(speedEl.value).toFixed(1);
  gl.uniform2f(uRes, cv.width, cv.height);
  gl.uniform1f(uT, t);
  gl.uniform2f(uMouse, mouse[0], mouse[1]);
  for(const id in toggles) gl.uniform1f(toggles[id], document.getElementById(id).checked ? 1:0);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}
requestAnimationFrame(frame);
</script>
</body>
</html>

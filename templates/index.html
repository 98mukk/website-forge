<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0C1830; --surface:#12274A; --line:rgba(226,232,244,.12);
    --text:#EDF1F8; --muted:#93A1BC; --accent:#C9A227; --accent-ink:#0C1830;
    --font-h:"Space Grotesk",sans-serif; --font-b:"IBM Plex Sans",sans-serif; --font-m:"IBM Plex Mono",monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100dvh}
  .wrap{max-width:1200px;margin:0 auto;padding:48px 24px 80px}

  header{display:flex;align-items:baseline;gap:14px;margin-bottom:56px}
  .mark{font-family:var(--font-h);font-weight:700;font-size:20px;letter-spacing:-.01em}
  .mark span{color:var(--accent)}
  .by{font-family:var(--font-m);font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}

  .grid{display:grid;grid-template-columns:5fr 7fr;gap:48px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}

  h1{font-family:var(--font-h);font-size:clamp(28px,4vw,40px);line-height:1.1;letter-spacing:-.02em;margin-bottom:10px}
  .sub{color:var(--muted);font-size:15px;margin-bottom:36px;max-width:44ch}

  label{display:block;font-family:var(--font-m);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  textarea,select{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:10px;
    color:var(--text);font-family:var(--font-b);font-size:15px;padding:14px 16px;outline:none;transition:border-color .2s}
  textarea{min-height:120px;resize:vertical}
  textarea:focus,select:focus{border-color:var(--accent)}
  .field{margin-bottom:22px}

  button{font-family:var(--font-h);font-weight:700;font-size:15px;border:none;border-radius:999px;cursor:pointer;
    transition:transform .15s,opacity .2s}
  button:active{transform:translateY(1px) scale(.98)}
  .primary{background:var(--accent);color:var(--accent-ink);padding:14px 34px}
  .primary:disabled{opacity:.55;cursor:wait}
  .ghost{background:transparent;color:var(--text);border:1px solid var(--line);padding:13px 26px;margin-left:12px}
  .ghost:disabled{opacity:.35;cursor:not-allowed}

  .status{font-family:var(--font-m);font-size:12.5px;color:var(--muted);margin-top:16px;min-height:18px}
  .status.err{color:#E86A5E}

  .preview label{margin-bottom:12px}
  .frame{width:100%;aspect-ratio:4/3;background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    display:flex;align-items:center;justify-content:center}
  .frame p{color:var(--muted);font-size:14px;padding:0 24px;text-align:center}
  iframe{width:100%;height:100%;border:none;background:#fff;display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="mark">Website<span>Forge</span></div>
    <div class="by">Lake Shore Digital</div>
  </header>

  <div class="grid">
    <section>
      <h1>Describe it. We build it.</h1>
      <p class="sub">Tell the Forge what the site is for. It designs and writes the whole page in about a minute.</p>

      <form id="forge-form">
        <div class="field">
          <label for="brief">The brief</label>
          <textarea id="brief" name="brief" required
            placeholder="A portfolio for Maximo Alanis, a paid-media marketer in Chicago. Sections: hero, about, services, results, contact."></textarea>
        </div>
        <div class="field">
          <label for="style">Style direction</label>
          <select id="style" name="style">
            <option value="clean and minimal">Clean and minimal</option>
            <option value="bold and dark">Bold and dark</option>
            <option value="warm and editorial">Warm and editorial</option>
          </select>
        </div>
        <button class="primary" id="summon-btn" type="submit">Summon site</button>
        <button class="ghost" id="download-btn" type="button" disabled>Download HTML</button>
        <p class="status" id="status"></p>
      </form>
    </section>

    <section class="preview">
      <label>Live preview</label>
      <div class="frame">
        <p id="empty-msg">Your summoned site appears here.</p>
        <iframe id="preview-frame" title="Generated site preview"></iframe>
      </div>
    </section>
  </div>
</div>

<script>
  const form = document.getElementById("forge-form");
  const btn = document.getElementById("summon-btn");
  const dl = document.getElementById("download-btn");
  const status = document.getElementById("status");
  const frame = document.getElementById("preview-frame");
  const empty = document.getElementById("empty-msg");
  let lastHtml = "";

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    btn.disabled = true; dl.disabled = true;
    btn.textContent = "Summoning...";
    status.classList.remove("err");
    status.textContent = "Forging your site. This takes about a minute.";
    try {
      const res = await fetch("/build", { method: "POST", body: new FormData(form) });
      if (!res.ok) throw new Error("Server error " + res.status);
      lastHtml = await res.text();
      frame.srcdoc = lastHtml;
      frame.style.display = "block";
      empty.style.display = "none";
      dl.disabled = false;
      status.textContent = "Done. Preview on the right.";
    } catch (err) {
      status.classList.add("err");
      status.textContent = "The summon failed. Try again. (" + err.message + ")";
    }
    btn.disabled = false;
    btn.textContent = "Summon site";
  });

  dl.addEventListener("click", () => {
    const blob = new Blob([lastHtml], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "site.html";
    a.click();
  });
</script>
</body>
</html>
